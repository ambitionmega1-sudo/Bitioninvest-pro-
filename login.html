
<!DOCTYPE html>
<html lang="en">

<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Login - BitionInvest</title>

<link rel="stylesheet" href="style.css">

</head>


<body>


<header>

<div class="logo">
BitionInvest
</div>

</header>



<section class="hero">


<div class="hero-content">


<h1>
Welcome Back
</h1>


<p>
Login to manage your investments.
</p>



<form id="loginForm">


<input 
type="email"
id="loginEmail"
placeholder="Email Address"
required>



<input
type="password"
id="loginPassword"
placeholder="Password"
required>



<button class="btn" type="submit">
Login
</button>


</form>


<p id="loginMessage"></p>



</div>


</section>



<script type="module" src="js/login.js"></script>


</body>

</html>
