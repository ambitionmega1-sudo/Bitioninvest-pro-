
<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Create Account - BitionInvest</title>
    <link rel="stylesheet" href="style.css">
</head>

<body>

<header>
    <div class="logo">BitionInvest</div>
</header>


<section class="hero">

<div class="hero-content">

<h1>Create Account</h1>

<p>
Join BitionInvest and start managing your investments.
</p>


<form id="registerForm">

<input 
type="text" 
id="name" 
placeholder="Full Name"
required>


<input 
type="email" 
id="email" 
placeholder="Email Address"
required>


<input 
type="password" 
id="password" 
placeholder="Password"
required>


<button class="btn" type="submit">
Register
</button>


</form>

<p id="message"></p>

</div>

</section>


<script type="module" src="js/auth.js"></script>

</body>
</html>
